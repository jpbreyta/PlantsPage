<!DOCTYPE html>

<html>
    <head>
        <title>Plants Page</title>
      <link rel="icon" href="icon.png">
	    <link rel="stylesheet" href="plants.css">
	    <script src="https://kit.fontawesome.com/b60df13ae0.js" crossorigin="anonymous"></script>
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	    <meta name="viewport" content="width=device-width, initial-scale=1">

	    <!--@import url('https://fonts.googleapis.com/css?family=Roboto&display=swap');-->
    </head>
<body>

  <!-- F O R M -->
    <div id="content">
    <div class="sidebar" id="sidebar">
        <center>
        <h2>PLANTS</h2>
        <p><b><i>Click on any content to display the plant information.</i></b></p>
        <label for="plant_name">Common Name: </label><br> <input type ="text" name = "pl-common" id="plant_name"><br><br>
        <label for="plant_scientific">Scientific Name: </label><br> <input type ="text" name = "pl-sci" id="plant_scientific"><br><br>
        <label for="plant_zone">Zone: </label><br> <input type ="text" name = "pl-zone" id="plant_zone"><br><br>
        <label for="plant_light">Light: </label><br> <input type ="text" name = "pl-light" id="plant_light"><br><br>
        <label for="plant_price">Price: </label><br> <input type ="text" name = "pl-price" id="plant_price"><br><br>
        <label for="plant_availability">Availability: </label><br> <input type ="pl-avl" name = "desc" id="plant_availability"><br><br>
        <button class="button-74" role="button" onclick="submitInput();">SUBMIT</button><br><br>
        </center>
        </div>
    </div>

    <div id = "table-container">
        <div id="content-tray">
          <br>
        <table id='demo'></table>
          

  <script>
    var x, xmlhttp, xmlDoc
    var editIndex = -1;

    xmlhttp = new XMLHttpRequest();
    xmlhttp.open("GET", "plant_catalog.xml", false);
    xmlhttp.send();
    xmlDoc = xmlhttp.responseXML; 
    x = xmlDoc.getElementsByTagName("PLANT");

    // -- T A B L E  L A Y O U T -- //
    table="<tr><th>COMMON NAME</th><th>SCIENTIFIC NAME</th><th>ZONE</th><th>LIGHT</th><th>PRICE</th><th>AVAILABILITY</th></tr>";
    for (i = 0; i <x.length; i++) { 
      table += "<tr onclick='displayBookDetails(" + i + ")'><td>";
      table += x[i].getElementsByTagName("COMMON")[0].childNodes[0].nodeValue;
      table += "</td onclick='displayBookDetails'><td>";
      table += x[i].getElementsByTagName("BOTANICAL")[0].childNodes[0].nodeValue;
      table += "</td><td>";
      table += x[i].getElementsByTagName("ZONE")[0].childNodes[0].nodeValue;
      table += "</td><td>";
      table += x[i].getElementsByTagName("LIGHT")[0].childNodes[0].nodeValue;
      table += "</td><td>";
      table += x[i].getElementsByTagName("PRICE")[0].childNodes[0].nodeValue;
      table += "</td><td>";
      table += x[i].getElementsByTagName("AVAILABILITY")[0].childNodes[0].nodeValue;
      table += "</td></tr>";
    }
    document.getElementById("demo").innerHTML = table; //submit content of demo to table
  
    displayBookDetails = (i) => {
      editIndex = i;
      document.getElementById("plant_name").value = x[i].getElementsByTagName("COMMON")[0].childNodes[0].nodeValue;
      document.getElementById("plant_scientific").value = x[i].getElementsByTagName("BOTANICAL")[0].childNodes[0].nodeValue;
      document.getElementById("plant_zone").value = x[i].getElementsByTagName("ZONE")[0].childNodes[0].nodeValue;
      document.getElementById("plant_light").value = x[i].getElementsByTagName("LIGHT")[0].childNodes[0].nodeValue;
      document.getElementById("plant_price").value = x[i].getElementsByTagName("PRICE")[0].childNodes[0].nodeValue;
      document.getElementById("plant_availability").value = x[i].getElementsByTagName("AVAILABILITY")[0].childNodes[0].nodeValue;
    };

    submitInput = () => {
      var commonName = document.getElementById("plant_name").value;
      var botanicalName = document.getElementById("plant_scientific").value;
      var zone = document.getElementById("plant_zone").value;
      var light = document.getElementById("plant_light").value;
      var price = document.getElementById("plant_price").value;
      var availability = document.getElementById("plant_availability").value;

      if (editIndex > -1) {
        var tableRows = document.getElementById("demo").rows[editIndex + 1]; // +1 to account for header row
        tableRows.cells[0].innerHTML = commonName;
        tableRows.cells[1].innerHTML = botanicalName;
        tableRows.cells[2].innerHTML = zone;
        tableRows.cells[3].innerHTML = light;
        tableRows.cells[4].innerHTML = price;
        tableRows.cells[5].innerHTML = availability;

        x[editIndex].getElementsByTagName("COMMON")[0].childNodes[0].nodeValue = commonName;
        x[editIndex].getElementsByTagName("BOTANICAL")[0].childNodes[0].nodeValue = botanicalName;
        x[editIndex].getElementsByTagName("ZONE")[0].childNodes[0].nodeValue = zone;
        x[editIndex].getElementsByTagName("LIGHT")[0].childNodes[0].nodeValue = light;
        x[editIndex].getElementsByTagName("PRICE")[0].childNodes[0].nodeValue = price;
        x[editIndex].getElementsByTagName("AVAILABILITY")[0].childNodes[0].nodeValue = availability;  
      } else {
        // Appends a new row if no existing row is currently selected
        var updateRow = "<tr onclick='displayBookDetails(" + x.length + ")'><td>" + commonName + "</td><td>" + botanicalName + "</td><td>" + zone + "</td><td>" + light + "</td><td>" + price + "</td><td>" + availability + "</td></tr>";
        document.getElementById("demo").innerHTML += updateRow;
      }

      // Clears the input fields after submission
      document.getElementById("plant_name").value = "";
      document.getElementById("plant_scientific").value = "";
      document.getElementById("plant_zone").value = "";
      document.getElementById("plant_light").value = "";
      document.getElementById("plant_price").value = "";
      document.getElementById("plant_availability").value = "";
    }

  </script>
</div>
</div>
</body>
</html>
