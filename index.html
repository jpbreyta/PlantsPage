<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plants Page</title>
    <link rel="icon" href="icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://kit.fontawesome.com/b60df13ae0.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-6">

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-8">
        
        <div id="sidebar" class="w-full md:w-1/3 bg-white p-6 rounded-lg shadow-md h-fit">
            <h2 class="text-2xl font-bold mb-2 text-green-700">
                <i class="mr-2"></i>PLANTS
            </h2>
            <p class="text-sm text-gray-500 mb-6 italic">Click on any content to display the plant information.</p>
            
            <div class="space-y-4">
                <div>
                    <label for="plant_name" class="block text-sm font-medium text-gray-700">Common Name:</label>
                    <input type="text" id="plant_name" class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-green-500 focus:outline-none">
                </div>
                <div>
                    <label for="plant_scientific" class="block text-sm font-medium text-gray-700">Scientific Name:</label>
                    <input type="text" id="plant_scientific" class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-green-500 focus:outline-none">
                </div>
                <div>
                    <label for="plant_zone" class="block text-sm font-medium text-gray-700">Zone:</label>
                    <input type="text" id="plant_zone" class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-green-500 focus:outline-none">
                </div>
                <div>
                    <label for="plant_light" class="block text-sm font-medium text-gray-700">Light:</label>
                    <input type="text" id="plant_light" class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-green-500 focus:outline-none">
                </div>
                <div>
                    <label for="plant_price" class="block text-sm font-medium text-gray-700">Price:</label>
                    <input type="text" id="plant_price" class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-green-500 focus:outline-none">
                </div>
                <div>
                    <label for="plant_availability" class="block text-sm font-medium text-gray-700">Availability:</label>
                    <input type="text" id="plant_availability" class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-green-500 focus:outline-none">
                </div>
                
                <button onclick="submitInput();" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-md transition duration-200 mt-4">
                    <i class="mr-2"></i>SUBMIT
                </button>
            </div>
        </div>

        <div id="table-container" class="w-full md:w-2/3 bg-white p-6 rounded-lg shadow-md overflow-x-auto flex flex-col">
            <table id="demo" class="min-w-full w-full border-collapse text-sm text-left mb-4">
                </table>
            
            <div class="flex justify-between items-center border-t border-gray-200 pt-4 mt-auto">
                <button id="prev-btn" onclick="changePage(-1)" class="bg-gray-200 hover:bg-gray-300 text-gray-700 py-1 px-3 rounded disabled:opacity-50 disabled:cursor-not-allowed transition">
                    <i class="mr-1"></i> Prev
                </button>
                <span id="page-info" class="text-sm font-medium text-gray-600"></span>
                <button id="next-btn" onclick="changePage(1)" class="bg-gray-200 hover:bg-gray-300 text-gray-700 py-1 px-3 rounded disabled:opacity-50 disabled:cursor-not-allowed transition">
                    Next <i class="ml-1"></i>
                </button>
            </div>
        </div>

    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center">
        <i id="toast-icon" class="text-green-400 mr-3 text-xl"></i>
        <span id="toast-message" class="font-medium"></span>
    </div>

    <script>
        var x, xmlhttp, xmlDoc;
        var editIndex = -1; //used to track the index of the plant being edited; -1 means no plant is being edited
        var currentPage = 1; //used to track the current page number for pagination
        var rowsPerPage = 11; //used to define how many rows are displayed per page for pagination

        xmlhttp = new XMLHttpRequest(); //used to create a new XMLHttpRequest object for fetching the XML data
        xmlhttp.open("GET", "plant_catalog.xml", false);
        xmlhttp.send();
        xmlDoc = xmlhttp.responseXML; 
        x = xmlDoc.getElementsByTagName("PLANT"); //used to get all the PLANT elements from the XML document and store them in the variable x

        var table = `
            <thead>
                <tr class="bg-gray-100 text-gray-600 uppercase text-xs leading-normal border-b border-gray-200">
                    <th class="py-3 px-4 font-semibold">COMMON NAME</th>
                    <th class="py-3 px-4 font-semibold">SCIENTIFIC NAME</th>
                    <th class="py-3 px-4 font-semibold">ZONE</th>
                    <th class="py-3 px-4 font-semibold">LIGHT</th>
                    <th class="py-3 px-4 font-semibold">PRICE</th>
                    <th class="py-3 px-4 font-semibold">AVAILABILITY</th>
                </tr>
            </thead>
            <tbody id="table-body">
        `;
        // Loops through each PLANT element in the XML and creates a table row for it
        for (var i = 0; i < x.length; i++) { 
            table += "<tr class='border-b border-gray-200 hover:bg-gray-50 cursor-pointer transition' onclick='displayBookDetails(" + i + ")'>";
            table += "<td class='py-3 px-4'>" + x[i].getElementsByTagName("COMMON")[0].childNodes[0].nodeValue + "</td>"; 
            table += "<td class='py-3 px-4'>" + x[i].getElementsByTagName("BOTANICAL")[0].childNodes[0].nodeValue + "</td>";
            table += "<td class='py-3 px-4'>" + x[i].getElementsByTagName("ZONE")[0].childNodes[0].nodeValue + "</td>";
            table += "<td class='py-3 px-4'>" + x[i].getElementsByTagName("LIGHT")[0].childNodes[0].nodeValue + "</td>";
            table += "<td class='py-3 px-4'>" + x[i].getElementsByTagName("PRICE")[0].childNodes[0].nodeValue + "</td>";
            table += "<td class='py-3 px-4'>" + x[i].getElementsByTagName("AVAILABILITY")[0].childNodes[0].nodeValue + "</td>";
            table += "</tr>";
        }
        table += "</tbody>";
        document.getElementById("demo").innerHTML = table; 
    
        // Hides rows that are not on the current page
        const updatePagination = () => {
            var tbody = document.getElementById("table-body");
            var rows = tbody.getElementsByTagName("tr");
            var totalPages = Math.ceil(rows.length / rowsPerPage);

            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            for (var j = 0; j < rows.length; j++) {
                if (j >= (currentPage - 1) * rowsPerPage && j < currentPage * rowsPerPage) {
                    rows[j].style.display = "";
                } else {
                    rows[j].style.display = "none";
                }
            }

            document.getElementById("page-info").innerText = "Page " + currentPage + " of " + (totalPages || 1);
            document.getElementById("prev-btn").disabled = currentPage === 1;
            document.getElementById("next-btn").disabled = currentPage === totalPages || totalPages === 0;
        };

        // Changes the current page and updates the visible rows
        const changePage = (direction) => {
            currentPage += direction;
            updatePagination();
        };

        // Initialize pagination on load
        updatePagination();
        
        // Displays the details of the selected plant in the input fields for editing
        displayBookDetails = (i) => {
            editIndex = i;
            document.getElementById("plant_name").value = x[i].getElementsByTagName("COMMON")[0].childNodes[0].nodeValue;
            document.getElementById("plant_scientific").value = x[i].getElementsByTagName("BOTANICAL")[0].childNodes[0].nodeValue;
            document.getElementById("plant_zone").value = x[i].getElementsByTagName("ZONE")[0].childNodes[0].nodeValue;
            document.getElementById("plant_light").value = x[i].getElementsByTagName("LIGHT")[0].childNodes[0].nodeValue;
            document.getElementById("plant_price").value = x[i].getElementsByTagName("PRICE")[0].childNodes[0].nodeValue;
            document.getElementById("plant_availability").value = x[i].getElementsByTagName("AVAILABILITY")[0].childNodes[0].nodeValue;
        };
        // Submits the input values to either update an existing plant or add a new one
        submitInput = () => {
            var commonName = document.getElementById("plant_name").value;
            var botanicalName = document.getElementById("plant_scientific").value;
            var zone = document.getElementById("plant_zone").value;
            var light = document.getElementById("plant_light").value;
            var price = document.getElementById("plant_price").value;
            var availability = document.getElementById("plant_availability").value;

            if (editIndex > -1) {
                var tableRows = document.getElementById("demo").rows[editIndex + 1]; 
                tableRows.cells[0].innerHTML = commonName;
                tableRows.cells[1].innerHTML = botanicalName;
                tableRows.cells[2].innerHTML = zone;
                tableRows.cells[3].innerHTML = light;
                tableRows.cells[4].innerHTML = price;
                tableRows.cells[5].innerHTML = availability;

                x[editIndex].getElementsByTagName("COMMON")[0].childNodes[0].nodeValue = commonName;
                x[editIndex].getElementsByTagName("BOTANICAL")[0].childNodes[0].nodeValue = botanicalName;
                x[editIndex].getElementsByTagName("ZONE")[0].childNodes[0].nodeValue = zone;
                x[editIndex].getElementsByTagName("LIGHT")[0].childNodes[0].nodeValue = light;
                x[editIndex].getElementsByTagName("PRICE")[0].childNodes[0].nodeValue = price;
                x[editIndex].getElementsByTagName("AVAILABILITY")[0].childNodes[0].nodeValue = availability;  
                
                editIndex = -1;
                if (typeof showToast === "function") showToast("Plant details successfully updated.");

            } else {
                var updateRow = "<tr class='border-b border-gray-200 hover:bg-gray-50 cursor-pointer transition' onclick='displayBookDetails(" + x.length + ")'>";
                updateRow += "<td class='py-3 px-4'>" + commonName + "</td>";
                updateRow += "<td class='py-3 px-4'>" + botanicalName + "</td>";
                updateRow += "<td class='py-3 px-4'>" + zone + "</td>";
                updateRow += "<td class='py-3 px-4'>" + light + "</td>";
                updateRow += "<td class='py-3 px-4'>" + price + "</td>";
                updateRow += "<td class='py-3 px-4'>" + availability + "</td></tr>";
                
                document.getElementById("table-body").innerHTML += updateRow;
                
                // Jumps to the last page to show the newly added row
                var totalRows = document.getElementById("table-body").getElementsByTagName("tr").length;
                currentPage = Math.ceil(totalRows / rowsPerPage);
                
                if (typeof showToast === "function") showToast("New plant successfully added.");
            }

            updatePagination();
            // Clear input fields after submission
            document.getElementById("plant_name").value = "";
            document.getElementById("plant_scientific").value = "";
            document.getElementById("plant_zone").value = "";
            document.getElementById("plant_light").value = "";
            document.getElementById("plant_price").value = "";
            document.getElementById("plant_availability").value = "";
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
